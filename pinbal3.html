<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pinball Hexagonal - Funcional</title>
  <style>
    body { margin:0; background:#111; overflow:hidden; display:flex; justify-content:center; align-items:center; height:100vh; }
    canvas { display:block; background:#1a1a2e; border:2px solid #4a4a6a; border-radius:8px; }
    #log { position:fixed; bottom:0; left:0; width:100%; max-height:120px; overflow-y:auto; background:rgba(0,0,0,0.85); color:#0f0; font:14px monospace; padding:8px; pointer-events:none; z-index:10; border-top:1px solid #333; }
    .info { position:fixed; top:10px; right:20px; color:#aaa; font:14px sans-serif; z-index:5; text-align:right; background:rgba(0,0,0,0.6); padding:10px; border-radius:8px; border:1px solid #333; }
    .info kbd { background:#222; color:#fff; padding:2px 8px; border-radius:4px; border:1px solid #555; }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="900"></canvas>
  <div id="log"></div>
  <div class="info">
    <kbd>←</kbd> / <kbd>A</kbd> Flipper Izq · <kbd>→</kbd> / <kbd>D</kbd> Flipper Der · <kbd>Espacio</kbd> Lanzar
  </div>

  <script type="importmap">
    {
      "imports": {
        "matter-js": "https://cdn.jsdelivr.net/npm/matter-js@0.19.0/+esm"
      }
    }
  </script>

  <script type="module">
    import * as Matter from 'matter-js';

    // =============================================================================
    // 0. UTILIDAD: Emisor de eventos simple para desacoplar
    // =============================================================================
    class EventBus {
      constructor() {
        this._listeners = {};
      }
      on(event, callback) {
        if (!this._listeners[event]) this._listeners[event] = [];
        this._listeners[event].push(callback);
      }
      off(event, callback) {
        if (!this._listeners[event]) return;
        this._listeners[event] = this._listeners[event].filter(cb => cb !== callback);
      }
      emit(event, data) {
        if (!this._listeners[event]) return;
        this._listeners[event].forEach(cb => cb(data));
      }
    }

    // =============================================================================
    // 1. PUERTOS (interfaces abstractas)
    // =============================================================================
    class IPhysics {
      /** Inicializa el motor físico según el estado inicial del dominio */
      init(domainState, eventBus) { throw new Error('abstract'); }
      /** Avanza la simulación un paso (delta en ms) */
      update(delta) { throw new Error('abstract'); }
      /** Sincroniza las posiciones del motor hacia el estado del dominio (retorna estado) */
      sync(domainState) { throw new Error('abstract'); }
      /** Activa un flipper (lado: 'left' | 'right') */
      activateFlipper(side) { throw new Error('abstract'); }
      /** Desactiva un flipper */
      deactivateFlipper(side) { throw new Error('abstract'); }
      /** Lanza la bola con una fuerza (0..1) */
      launchBall(force) { throw new Error('abstract'); }
      /** Reinicia la bola en la posición de lanzamiento */
      resetBall() { throw new Error('abstract'); }
    }

    class IRenderer {
      /** Dibuja el estado completo del juego */
      draw(domainState, physicsState) { throw new Error('abstract'); }
    }

    class IInput {
      /** Comienza a escuchar eventos de entrada; emite a través del bus */
      start(eventBus) { throw new Error('abstract'); }
      /** Detiene la escucha */
      stop() { throw new Error('abstract'); }
    }

    class IConfig {
      /** Carga la configuración de la mesa (promesa) */
      loadTable(source) { throw new Error('abstract'); }
    }

    // =============================================================================
    // 2. DOMINIO (estado y reglas puras, sin física)
    // =============================================================================
    /**
     * Representa el estado mutable del juego (puntuación, vidas, luces...).
     * NO contiene posiciones/velocidades de la bola, eso lo maneja el motor.
     */
    class GameDomain {
      constructor(initialConfig) {
        this.score = 0;
        this.lives = initialConfig.lives || 3;
        this.ballActive = false;
        this.mode = 'normal';
        this.lights = {
          bonus: false,
          multiball: false
        };
        // Guardamos referencia a la configuración de elementos (bumpers, agujeros)
        this.config = initialConfig;
        // Contadores para modos especiales
        this.bumperHits = {};
        initialConfig.bumpers.forEach(b => this.bumperHits[b.id] = 0);
      }

      /** Procesa un evento del motor o de entrada */
      handleEvent(eventName, data) {
        switch (eventName) {
          case 'bumper_hit':
            this._onBumperHit(data.id);
            break;
          case 'drain':
            this._onDrain();
            break;
          case 'ball_launched':
            this.ballActive = true;
            break;
          case 'ball_lost':
            this.ballActive = false;
            break;
          case 'game_over':
            // nada extra
            break;
          default: break;
        }
        return this; // para encadenamiento
      }

      _onBumperHit(bumperId) {
        const bumper = this.config.bumpers.find(b => b.id === bumperId);
        if (!bumper) return;
        this.score += bumper.points;
        this.bumperHits[bumperId] = (this.bumperHits[bumperId] || 0) + 1;
        // Lógica de luces: si golpeamos el bumper central (b1) encendemos bonus
        if (bumperId === 'b1') {
          this.lights.bonus = true;
        }
        // Ejemplo: si todos los bumpers han sido golpeados, encendemos multiball
        const allHit = Object.values(this.bumperHits).every(hits => hits > 0);
        if (allHit) {
          this.lights.multiball = true;
        }
      }

      _onDrain() {
        this.lives -= 1;
        this.lights.bonus = false; // perder bola apaga bonus
        if (this.lives <= 0) {
          this.lives = 0;
          // Emitir game over se hará desde el orquestador
        }
      }

      /** Reinicia el estado después de perder una vida (mantiene puntuación) */
      resetForNewBall() {
        this.ballActive = true;
        this.lights.bonus = false;
        // Reiniciamos contadores de bumpers para la nueva bola
        this.config.bumpers.forEach(b => this.bumperHits[b.id] = 0);
        this.lights.multiball = false;
      }
    }

    // =============================================================================
    // 3. ADAPTADORES
    // =============================================================================

    // --- 3.1 ADAPTADOR DE FÍSICA (Matter.js) ---
    class MatterPhysicsAdapter extends IPhysics {
      constructor(canvasWidth, canvasHeight) {
        super();
        this.width = canvasWidth;
        this.height = canvasHeight;
        this.engine = null;
        this.ballBody = null;
        this.flipperBodies = { left: null, right: null };
        this.flipperPivots = { left: null, right: null };
        this.wallBodies = [];
        this.bumperBodies = [];
        this.drainSensors = [];
        this.eventBus = null;
        // Parámetros de flippers
        this.flipperLength = 70;
        this.flipperWidth = 14;
        this.flipperAngleRest = 0.1;  // ligeramente hacia arriba en reposo
        this.flipperAngleActive = -0.5; // hacia arriba al activar
        this.flipperForce = 0.15;       // torque
        this.flipperDamping = 0.9;
        // Plunger
        this.plungerReady = false;
        this.launchForceBase = -0.05; // impulso vertical (negativo = arriba)
      }

      init(domainState, eventBus) {
        this.eventBus = eventBus;
        // Crear motor con gravedad
        this.engine = Matter.Engine.create({
          gravity: { x: 0, y: 0.8, scale: 0.001 } // gravedad suave pero presente
        });

        // Construir paredes (estáticas)
        this._createWalls();

        // Crear bumpers (estáticos, alta restitución)
        this._createBumpers(domainState.config.bumpers);

        // Crear sensores de drenaje (agujeros)
        this._createDrainSensors(domainState.config.drains);

        // Crear flippers (cuerpos dinámicos con restricción de ángulo)
        this._createFlippers();

        // Crear bola en posición de lanzamiento
        this._createBall();

        // Escuchar colisiones
        Matter.Events.on(this.engine, 'collisionStart', (event) => {
          event.pairs.forEach(pair => {
            const { bodyA, bodyB } = pair;
            // Determinar si colisiona con bumper
            const bumper = this.bumperBodies.find(b => b === bodyA || b === bodyB);
            if (bumper && (bodyA === this.ballBody || bodyB === this.ballBody)) {
              // Emitir evento de bumper hit con el id
              this.eventBus.emit('bumper_hit', { id: bumper.label });
            }
            // Determinar si colisiona con sensor de drenaje
            const drain = this.drainSensors.find(d => d === bodyA || d === bodyB);
            if (drain && (bodyA === this.ballBody || bodyB === this.ballBody)) {
              this.eventBus.emit('drain', {});
            }
          });
        });
      }

      _createWalls() {
        const w = this.width;
        const h = this.height;
        const wallOptions = { isStatic: true, friction: 0.2, restitution: 0.3, label: 'wall' };
        const walls = [
          // pared izquierda
          Matter.Bodies.rectangle(20, h/2, 20, h, wallOptions),
          // pared derecha
          Matter.Bodies.rectangle(w - 20, h/2, 20, h, wallOptions),
          // pared superior
          Matter.Bodies.rectangle(w/2, 20, w, 20, wallOptions),
          // pared inferior (excepto hueco central y laterales para drenaje)
          // Dividimos en segmentos
          Matter.Bodies.rectangle(w/2, h - 20, 200, 20, { ...wallOptions, label: 'bottom_center' }),
          Matter.Bodies.rectangle(50, h - 20, 80, 20, { ...wallOptions, label: 'bottom_left' }),
          Matter.Bodies.rectangle(w - 50, h - 20, 80, 20, { ...wallOptions, label: 'bottom_right' })
        ];
        walls.forEach(wall => Matter.Composite.add(this.engine.world, wall));
        this.wallBodies = walls;
      }

      _createBumpers(bumpersConfig) {
        bumpersConfig.forEach(cfg => {
          const body = Matter.Bodies.circle(cfg.x, cfg.y, cfg.radius, {
            isStatic: true,
            restitution: 1.2,
            friction: 0.1,
            label: cfg.id
          });
          Matter.Composite.add(this.engine.world, body);
          this.bumperBodies.push(body);
        });
      }

      _createDrainSensors(drainsConfig) {
        drainsConfig.forEach(cfg => {
          const sensor = Matter.Bodies.circle(cfg.x, cfg.y, cfg.radius, {
            isStatic: true,
            isSensor: true,
            label: cfg.id
          });
          Matter.Composite.add(this.engine.world, sensor);
          this.drainSensors.push(sensor);
        });
      }

      _createFlippers() {
        // Posiciones de pivote
        const pivotLeft = { x: 180, y: 800 };
        const pivotRight = { x: 620, y: 800 };
        const width = this.flipperWidth;
        const length = this.flipperLength;

        // Flipper izquierdo: rectángulo inclinado, pivote en extremo derecho
        const flipperLeft = Matter.Bodies.rectangle(pivotLeft.x + length/2, pivotLeft.y, length, width, {
          density: 0.02,
          friction: 0.4,
          restitution: 0.1,
          label: 'flipper_left',
          collisionFilter: { group: -1 } // colisiona con todo excepto otros flippers
        });
        // Restricción de pivote (revolute libre)
        const constraintLeft = Matter.Constraint.create({
          pointA: pivotLeft,
          bodyB: flipperLeft,
          pointB: { x: -length/2, y: 0 },
          stiffness: 1,
          length: 0
        });
        // Flipper derecho (simétrico)
        const flipperRight = Matter.Bodies.rectangle(pivotRight.x - length/2, pivotRight.y, length, width, {
          density: 0.02,
          friction: 0.4,
          restitution: 0.1,
          label: 'flipper_right',
          collisionFilter: { group: -1 }
        });
        const constraintRight = Matter.Constraint.create({
          pointA: pivotRight,
          bodyB: flipperRight,
          pointB: { x: length/2, y: 0 },
          stiffness: 1,
          length: 0
        });

        Matter.Composite.add(this.engine.world, [flipperLeft, flipperRight, constraintLeft, constraintRight]);
        this.flipperBodies.left = flipperLeft;
        this.flipperBodies.right = flipperRight;
        this.flipperPivots.left = pivotLeft;
        this.flipperPivots.right = pivotRight;
      }

      _createBall() {
        // Posición de lanzamiento (encima del plunger)
        const ballX = this.width / 2;
        const ballY = this.height - 120;
        this.ballBody = Matter.Bodies.circle(ballX, ballY, 12, {
          restitution: 0.5,
          friction: 0.02,
          density: 0.015,
          label: 'ball'
        });
        Matter.Composite.add(this.engine.world, this.ballBody);
      }

      update(delta) {
        Matter.Engine.update(this.engine, delta);
        // Limitar el ángulo de los flippers manualmente
        this._constrainFlipperAngle('left');
        this._constrainFlipperAngle('right');
      }

      _constrainFlipperAngle(side) {
        const body = this.flipperBodies[side];
        if (!body) return;
        const pivot = this.flipperPivots[side];
        const sign = side === 'left' ? 1 : -1;
        // Calcular ángulo actual respecto al pivote
        const dx = body.position.x - pivot.x;
        const dy = body.position.y - pivot.y;
        let angle = Math.atan2(dy, dx);
        // Ángulo deseado en reposo: horizontal con ligera inclinación (0.1 rad hacia arriba)
        const restAngle = side === 'left' ? 0.2 : Math.PI - 0.2;
        // Aplicar torque para volver a reposo si no está activado
        if (!this._flipperActiveState[side]) {
          const diff = restAngle - angle;
          Matter.Body.setAngularVelocity(body, diff * 0.1);
        }
        // Limitar ángulo máximo activo
        const maxAngle = side === 'left' ? -0.6 : Math.PI + 0.6;
        const minAngle = restAngle;
        if (side === 'left') {
          if (angle < maxAngle) Matter.Body.setAngle(body, maxAngle);
          if (angle > minAngle) Matter.Body.setAngle(body, minAngle);
        } else {
          if (angle > maxAngle) Matter.Body.setAngle(body, maxAngle);
          if (angle < minAngle) Matter.Body.setAngle(body, minAngle);
        }
      }

      // Estado de activación de flippers (booleano)
      _flipperActiveState = { left: false, right: false };

      activateFlipper(side) {
        this._flipperActiveState[side] = true;
        const body = this.flipperBodies[side];
        if (!body) return;
        // Aplicar torque fuerte para moverlo
        const torque = side === 'left' ? -this.flipperForce : this.flipperForce;
        Matter.Body.setAngularVelocity(body, torque);
      }

      deactivateFlipper(side) {
        this._flipperActiveState[side] = false;
        // La restricción de ángulo en update lo devolverá a reposo
      }

      launchBall(force) {
        if (!this.ballBody) return;
        // Aplicar impulso vertical hacia arriba
        const impulse = force * this.launchForceBase * 1000; // escalado
        Matter.Body.applyForce(this.ballBody, this.ballBody.position, { x: 0, y: impulse });
        this.eventBus.emit('ball_launched', {});
      }

      resetBall() {
        if (this.ballBody) {
          Matter.Composite.remove(this.engine.world, this.ballBody);
        }
        this._createBall();
        this.eventBus.emit('ball_reset', {});
      }

      /**
       * Sincroniza el estado del dominio con las posiciones reales de la bola
       * Retorna un objeto con la información necesaria para el render
       */
      sync(domainState) {
        if (!this.ballBody) return { ball: null };
        const ball = {
          x: this.ballBody.position.x,
          y: this.ballBody.position.y,
          angle: this.ballBody.angle,
          active: domainState.ballActive
        };
        // También retornamos los ángulos de los flippers para dibujarlos
        const flipperAngles = {
          left: this.flipperBodies.left ? this.flipperBodies.left.angle : 0,
          right: this.flipperBodies.right ? this.flipperBodies.right.angle : 0
        };
        return { ball, flipperAngles };
      }
    }

    // --- 3.2 ADAPTADOR DE RENDERIZADO (Canvas 2D) ---
    class CanvasRendererAdapter extends IRenderer {
      constructor(canvas) {
        super();
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
      }

      draw(domainState, physicsState) {
        const ctx = this.ctx;
        const w = this.canvas.width;
        const h = this.canvas.height;

        // Fondo
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, w, h);

        // Borde decorativo
        ctx.strokeStyle = '#4a4a6a';
        ctx.lineWidth = 4;
        ctx.strokeRect(20, 20, w - 40, h - 40);

        // Dibujar bumpers
        domainState.config.bumpers.forEach(b => {
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
          ctx.fillStyle = domainState.lights.bonus && b.id === 'b1' ? '#ff6b6b' : '#ffd93d';
          ctx.fill();
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.stroke();
        });

        // Dibujar drenajes (agujeros)
        domainState.config.drains.forEach(d => {
          ctx.beginPath();
          ctx.arc(d.x, d.y, d.radius, 0, Math.PI * 2);
          ctx.fillStyle = '#111';
          ctx.fill();
          ctx.strokeStyle = '#555';
          ctx.lineWidth = 2;
          ctx.stroke();
        });

        // Dibujar flippers (usando ángulos reales del motor)
        const drawFlipper = (side) => {
          const angle = physicsState.flipperAngles[side];
          const pivot = side === 'left' ? { x: 180, y: 800 } : { x: 620, y: 800 };
          const length = 70;
          const width = 14;
          ctx.save();
          ctx.translate(pivot.x, pivot.y);
          ctx.rotate(angle);
          ctx.fillStyle = '#4ecdc4';
          ctx.shadowColor = '#4ecdc4';
          ctx.shadowBlur = 10;
          // Rectángulo centrado en el pivote? Ajustar según creación de cuerpos
          if (side === 'left') {
            ctx.fillRect(0, -width/2, length, width);
          } else {
            ctx.fillRect(-length, -width/2, length, width);
          }
          ctx.restore();
        };
        drawFlipper('left');
        drawFlipper('right');

        // Luces indicadoras
        const luzPositions = { bonus: { x: 720, y: 80 }, multiball: { x: 720, y: 120 } };
        Object.entries(domainState.lights).forEach(([name, active]) => {
          const pos = luzPositions[name];
          if (!pos) return;
          ctx.beginPath();
          ctx.arc(pos.x, pos.y, 12, 0, Math.PI * 2);
          ctx.fillStyle = active ? '#00ff88' : '#333';
          ctx.fill();
          ctx.strokeStyle = active ? '#00ff88' : '#555';
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.fillStyle = '#fff';
          ctx.font = '10px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(name.toUpperCase(), pos.x, pos.y + 30);
        });

        // Bola
        if (physicsState.ball && domainState.ballActive) {
          ctx.beginPath();
          ctx.arc(physicsState.ball.x, physicsState.ball.y, 12, 0, Math.PI * 2);
          ctx.fillStyle = '#f8f9fa';
          ctx.shadowColor = '#fff';
          ctx.shadowBlur = 15;
          ctx.fill();
          ctx.shadowBlur = 0;
        }

        // Texto informativo
        ctx.fillStyle = '#fff';
        ctx.font = '20px monospace';
        ctx.fillText(`Puntos: ${domainState.score}`, 60, 80);
        ctx.fillText(`Vidas: ${domainState.lives}`, 60, 120);
        ctx.fillStyle = '#ffd93d';
        ctx.font = '16px monospace';
        ctx.fillText(`Modo: ${domainState.mode}`, 60, 160);
      }
    }

    // --- 3.3 ADAPTADOR DE ENTRADA (Teclado) ---
    class KeyboardInputAdapter extends IInput {
      constructor() {
        super();
        this.eventBus = null;
        this._handler = this._handleKey.bind(this);
        this._keys = {};
      }

      start(eventBus) {
        this.eventBus = eventBus;
        window.addEventListener('keydown', this._handler);
        window.addEventListener('keyup', this._handler);
      }

      stop() {
        window.removeEventListener('keydown', this._handler);
        window.removeEventListener('keyup', this._handler);
      }

      _handleKey(e) {
        const key = e.key;
        const isDown = e.type === 'keydown';
        // Prevenir scroll con espacio
        if (key === ' ' || key === 'Space') e.preventDefault();

        // Mapeo de teclas a eventos de dominio
        if (key === 'ArrowLeft' || key === 'a' || key === 'A') {
          this.eventBus.emit(isDown ? 'flipper_left_down' : 'flipper_left_up');
        }
        if (key === 'ArrowRight' || key === 'd' || key === 'D') {
          this.eventBus.emit(isDown ? 'flipper_right_down' : 'flipper_right_up');
        }
        if ((key === ' ' || key === 'Space') && isDown) {
          this.eventBus.emit('launch');
        }
      }
    }

    // --- 3.4 ADAPTADOR DE CONFIGURACIÓN (JSON estático) ---
    class JsonConfigAdapter extends IConfig {
      async loadTable(source = 'default') {
        // Configuración de la mesa de prueba
        return {
          lives: 3,
          bumpers: [
            { id: 'b1', x: 400, y: 300, radius: 25, points: 100 },
            { id: 'b2', x: 330, y: 240, radius: 25, points: 150 },
            { id: 'b3', x: 470, y: 240, radius: 25, points: 150 }
          ],
          drains: [
            { id: 'drain_left', x: 200, y: 830, radius: 22 },
            { id: 'drain_right', x: 600, y: 830, radius: 22 }
          ]
        };
      }
    }

    // =============================================================================
    // 4. APLICACIÓN (Orquestador)
    // =============================================================================
    class PinballGame {
      constructor(canvasId, logId) {
        this.canvas = document.getElementById(canvasId);
        this.logElement = document.getElementById(logId);
        this.domain = null;
        this.physics = null;
        this.renderer = null;
        this.input = null;
        this.configAdapter = null;
        this.eventBus = new EventBus();
        this.rafId = null;
        this.lastTime = 0;
        this.gameOver = false;
      }

      async init() {
        // Cargar configuración
        this.configAdapter = new JsonConfigAdapter();
        const config = await this.configAdapter.loadTable();
        // Instanciar dominio
        this.domain = new GameDomain(config);
        // Adaptadores
        this.physics = new MatterPhysicsAdapter(this.canvas.width, this.canvas.height);
        this.renderer = new CanvasRendererAdapter(this.canvas);
        this.input = new KeyboardInputAdapter();

        // Inicializar física con el estado del dominio y el bus de eventos
        this.physics.init(this.domain, this.eventBus);
        // Comenzar escucha de entrada
        this.input.start(this.eventBus);

        // Suscribirnos a eventos del bus para modificar dominio y física
        this._subscribeEvents();

        // Activar la bola inicial
        this.domain.ballActive = true;
        this.physics.resetBall(); // Asegura que la bola esté lista

        // Iniciar bucle de juego
        this.lastTime = performance.now();
        this.rafId = requestAnimationFrame((t) => this._loop(t));

        this._log('Pinball iniciado. ¡Buena suerte!');
      }

      _subscribeEvents() {
        // Eventos de colisión (desde el motor)
        this.eventBus.on('bumper_hit', (data) => {
          this.domain.handleEvent('bumper_hit', data);
        });
        this.eventBus.on('drain', () => {
          if (!this.domain.ballActive) return; // Evitar múltiples drenajes
          this.domain.handleEvent('drain');
          this._log('¡Bola perdida!');
          if (this.domain.lives <= 0) {
            this._gameOver();
          } else {
            // Reiniciar bola tras un breve retardo
            setTimeout(() => {
              if (!this.gameOver) {
                this.physics.resetBall();
                this.domain.resetForNewBall();
                this._log('Nueva bola lista.');
              }
            }, 800);
          }
        });

        // Eventos de entrada
        this.eventBus.on('flipper_left_down', () => {
          this.physics.activateFlipper('left');
        });
        this.eventBus.on('flipper_left_up', () => {
          this.physics.deactivateFlipper('left');
        });
        this.eventBus.on('flipper_right_down', () => {
          this.physics.activateFlipper('right');
        });
        this.eventBus.on('flipper_right_up', () => {
          this.physics.deactivateFlipper('right');
        });
        this.eventBus.on('launch', () => {
          if (!this.domain.ballActive && this.domain.lives > 0) {
            // Si la bola no está activa (por ejemplo, recién perdida), no lanzar
            return;
          }
          if (this.domain.ballActive) {
            // Solo lanzar si la bola está en la zona de lanzamiento (opcional)
            // Por simplicidad, lanzamos siempre que esté activa
            this.physics.launchBall(0.9);
            this._log('¡Lanzamiento!');
          }
        });
      }

      _loop(timestamp) {
        if (this.gameOver) {
          this.renderer.draw(this.domain, this.physics.sync(this.domain));
          return; // detener bucle
        }
        const delta = Math.min(100, timestamp - this.lastTime);
        this.lastTime = timestamp;

        // Actualizar física
        this.physics.update(delta);

        // Sincronizar estado visual (posiciones)
        const physicsState = this.physics.sync(this.domain);

        // Renderizar
        this.renderer.draw(this.domain, physicsState);

        // Solicitar siguiente frame
        this.rafId = requestAnimationFrame((t) => this._loop(t));
      }

      _gameOver() {
        this.gameOver = true;
        this._log('💀 GAME OVER 💀');
        this.input.stop();
        // Podríamos mostrar un mensaje en el canvas
      }

      _log(msg) {
        if (!this.logElement) return;
        const entry = document.createElement('div');
        entry.textContent = msg;
        this.logElement.appendChild(entry);
        this.logElement.scrollTop = this.logElement.scrollHeight;
        if (this.logElement.children.length > 50) {
          this.logElement.removeChild(this.logElement.firstChild);
        }
      }
    }

    // =============================================================================
    // 5. PUNTO DE ENTRADA
    // =============================================================================
    const game = new PinballGame('gameCanvas', 'log');
    game.init().catch(err => console.error('Error al iniciar el juego:', err));

    // Exponer para depuración (opcional)
    window.__game = game;
  </script>
</body>
